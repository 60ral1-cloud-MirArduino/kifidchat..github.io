<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Технические работы</title>
    <style>
        /* ── сброс и общие стили ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* ── основная карточка ── */
        .maintenance-card {
            position: relative;
            max-width: 700px;
            width: 100%;
            background: rgba(22, 28, 46, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 60px 40px 50px;
            text-align: center;
            box-shadow:
                0 25px 50px -8px rgba(0, 0, 0, 0.8),
                inset 0 1px 2px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: transform 0.3s ease;
        }

        /* ── переключатель языков ── */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b0c0e0;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
            backdrop-filter: blur(4px);
            background: rgba(20, 28, 48, 0.5);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .lang-btn:hover {
            background: rgba(74, 124, 247, 0.2);
            border-color: rgba(74, 124, 247, 0.3);
            color: #f0f4ff;
            transform: scale(1.03);
        }

        .lang-btn.active {
            background: #4a7cf7;
            border-color: #4a7cf7;
            color: #fff;
            box-shadow: 0 0 16px rgba(74, 124, 247, 0.3);
        }

        /* ── иконка / шестерёнка (анимированная) ── */
        .gear-icon {
            display: inline-block;
            font-size: 72px;
            line-height: 1;
            margin-bottom: 18px;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 12px rgba(100, 180, 255, 0.25));
            user-select: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── заголовок ── */
        .maintenance-card h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f0f4ff;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0, 20, 40, 0.6);
        }

        /* ── подзаголовок ── */
        .maintenance-card .sub {
            font-size: 1.1rem;
            color: #9aa9c9;
            margin-bottom: 32px;
            font-weight: 400;
            letter-spacing: 0.02em;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            padding-bottom: 24px;
        }

        /* ── контейнер для индикаторов ── */
        .loader-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        /* ── полоски-пульсаторы ── */
        .pulse-bar {
            width: 10px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(180deg, #4a7cf7, #6c5ce7);
            box-shadow: 0 0 12px rgba(74, 124, 247, 0.3);
            animation: pulse 1.2s ease-in-out infinite alternate;
            transform-origin: center;
        }

        .pulse-bar:nth-child(1) {
            animation-delay: 0.0s;
            background: linear-gradient(180deg, #4a7cf7, #6c5ce7);
        }
        .pulse-bar:nth-child(2) {
            animation-delay: 0.15s;
            background: linear-gradient(180deg, #5f8af7, #7d6ff0);
        }
        .pulse-bar:nth-child(3) {
            animation-delay: 0.3s;
            background: linear-gradient(180deg, #7a9af9, #9a84f5);
        }
        .pulse-bar:nth-child(4) {
            animation-delay: 0.45s;
            background: linear-gradient(180deg, #96aafa, #b59afa);
        }
        .pulse-bar:nth-child(5) {
            animation-delay: 0.6s;
            background: linear-gradient(180deg, #b2bafb, #cfb0ff);
        }

        @keyframes pulse {
            0% {
                transform: scaleY(0.4);
                opacity: 0.5;
            }
            100% {
                transform: scaleY(1.2);
                opacity: 1;
            }
        }

        /* ── текст-статус с точками ── */
        .status-text {
            font-size: 1rem;
            color: #b7c6e6;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-weight: 300;
            margin-bottom: 24px;
        }

        .status-text .dots span {
            display: inline-block;
            animation: dotJump 1.4s infinite alternate;
            font-size: 1.6rem;
            line-height: 1;
            color: #7a9af9;
        }

        .status-text .dots span:nth-child(1) {
            animation-delay: 0.0s;
        }
        .status-text .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .status-text .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotJump {
            0% {
                transform: translateY(0px);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ── мелкий футер ── */
        .footer-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #4a5a7a;
            letter-spacing: 0.04em;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-note .heart {
            color: #f75c7e;
            display: inline-block;
            animation: heartbeat 1.6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.25);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.2);
            }
            56% {
                transform: scale(1);
            }
        }

        .footer-note .shine {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4a7cf7;
            display: inline-block;
            animation: shinePulse 2s ease-in-out infinite;
            box-shadow: 0 0 8px #4a7cf7;
        }

        @keyframes shinePulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        /* ── адаптив ── */
        @media (max-width: 580px) {
            .maintenance-card {
                padding: 40px 20px 30px;
                border-radius: 32px;
            }
            .maintenance-card h1 {
                font-size: 1.8rem;
            }
            .gear-icon {
                font-size: 52px;
            }
            .pulse-bar {
                width: 8px;
                height: 32px;
            }
            .lang-switcher {
                top: 14px;
                right: 16px;
                gap: 5px;
            }
            .lang-btn {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .footer-note {
                font-size: 0.75rem;
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">

        <!-- переключатель языков -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="ru">RU</button>
            <button class="lang-btn" data-lang="ua">UA</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>

        <!-- анимированная шестерёнка -->
        <div class="gear-icon">⚙️</div>

        <!-- главный заголовок -->
        <h1 data-i18n="heading">Технические работы</h1>
        <p class="sub" data-i18n="sub">на сайте · скоро всё заработает</p>

        <!-- индикаторы-полоски -->
        <div class="loader-group">
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
        </div>

        <!-- статус с анимированными точками -->
        <div class="status-text">
            <span data-i18n="status">Идёт обновление</span>
            <span class="dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </span>
        </div>

        <!-- нижняя строка: извинения + "команда разработчиков Restart group" + сердечко + shine -->
        <div class="footer-note">
            <span data-i18n="footer-apology">приносим извинения</span>
            <span class="heart">♥</span>
            <span data-i18n="footer-team">команда разработчиков Restart group</span>
            <span class="shine"></span>
        </div>

    </div>

    <script>
        (function() {
            // ── словарь переводов ──
            const translations = {
                ru: {
                    heading: 'Технические работы',
                    sub: 'на сайте · скоро всё заработает',
                    status: 'Идёт обновление',
                    'footer-apology': 'приносим извинения',
                    'footer-team': 'команда разработчиков Restart group'
                },
                ua: {
                    heading: 'Технічні роботи',
                    sub: 'на сайті · скоро все запрацює',
                    status: 'Йде оновлення',
                    'footer-apology': 'вибачте',
                    'footer-team': 'команда розробників Restart group'
                },
                en: {
                    heading: 'Technical Maintenance',
                    sub: 'on the site · will be back soon',
                    status: 'Updating',
                    'footer-apology': 'we apologize',
                    'footer-team': 'developer team Restart group'
                }
            };

            // ── элементы с data-i18n ──
            const i18nElements = document.querySelectorAll('[data-i18n]');
            const langButtons = document.querySelectorAll('.lang-btn');

            // ── текущий язык (по умолчанию русский) ──
            let currentLang = 'ru';

            // ── функция смены языка ──
            function setLanguage(lang) {
                if (!translations[lang]) return;
                currentLang = lang;

                // обновить тексты
                i18nElements.forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[lang][key] !== undefined) {
                        el.textContent = translations[lang][key];
                    }
                });

                // обновить активную кнопку
                langButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.lang === lang);
                });
            }

            // ── обработчики кликов по кнопкам ──
            langButtons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const lang = this.dataset.lang;
                    if (lang && lang !== currentLang) {
                        setLanguage(lang);
                    }
                });
            });

            // ── установить язык по умолчанию (RU) ──
            setLanguage('ru');
        })();
    </script>

</body>
</html>
