<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Технические работы</title>
    <style>
        /* ── сброс и общие стили ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* ── основная карточка ── */
        .maintenance-card {
            max-width: 700px;
            width: 100%;
            background: rgba(22, 28, 46, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 60px 40px 50px;
            text-align: center;
            box-shadow:
                0 25px 50px -8px rgba(0, 0, 0, 0.8),
                inset 0 1px 2px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: transform 0.3s ease;
        }

        /* ── иконка / шестерёнка (анимированная) ── */
        .gear-icon {
            display: inline-block;
            font-size: 72px;
            line-height: 1;
            margin-bottom: 18px;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 12px rgba(100, 180, 255, 0.25));
            user-select: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── заголовок ── */
        .maintenance-card h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f0f4ff;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0, 20, 40, 0.6);
        }

        /* ── подзаголовок ── */
        .maintenance-card .sub {
            font-size: 1.1rem;
            color: #9aa9c9;
            margin-bottom: 32px;
            font-weight: 400;
            letter-spacing: 0.02em;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            padding-bottom: 24px;
        }

        /* ── контейнер для индикаторов ── */
        .loader-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        /* ── полоски-пульсаторы ── */
        .pulse-bar {
            width: 10px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(180deg, #4a7cf7, #6c5ce7);
            box-shadow: 0 0 12px rgba(74, 124, 247, 0.3);
            animation: pulse 1.2s ease-in-out infinite alternate;
            transform-origin: center;
        }

        .pulse-bar:nth-child(1) {
            animation-delay: 0.0s;
            background: linear-gradient(180deg, #4a7cf7, #6c5ce7);
        }
        .pulse-bar:nth-child(2) {
            animation-delay: 0.15s;
            background: linear-gradient(180deg, #5f8af7, #7d6ff0);
        }
        .pulse-bar:nth-child(3) {
            animation-delay: 0.3s;
            background: linear-gradient(180deg, #7a9af9, #9a84f5);
        }
        .pulse-bar:nth-child(4) {
            animation-delay: 0.45s;
            background: linear-gradient(180deg, #96aafa, #b59afa);
        }
        .pulse-bar:nth-child(5) {
            animation-delay: 0.6s;
            background: linear-gradient(180deg, #b2bafb, #cfb0ff);
        }

        @keyframes pulse {
            0% {
                transform: scaleY(0.4);
                opacity: 0.5;
            }
            100% {
                transform: scaleY(1.2);
                opacity: 1;
            }
        }

        /* ── текст-статус с точками ── */
        .status-text {
            font-size: 1rem;
            color: #b7c6e6;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-weight: 300;
        }

        .status-text .dots span {
            display: inline-block;
            animation: dotJump 1.4s infinite alternate;
            font-size: 1.6rem;
            line-height: 1;
            color: #7a9af9;
        }

        .status-text .dots span:nth-child(1) {
            animation-delay: 0.0s;
        }
        .status-text .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .status-text .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotJump {
            0% {
                transform: translateY(0px);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* ── мелкий футер ── */
        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #4a5a7a;
            letter-spacing: 0.04em;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .footer-note .heart {
            color: #f75c7e;
            display: inline-block;
            animation: heartbeat 1.6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            14% {
                transform: scale(1.25);
            }
            28% {
                transform: scale(1);
            }
            42% {
                transform: scale(1.2);
            }
            56% {
                transform: scale(1);
            }
        }

        .footer-note .shine {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4a7cf7;
            display: inline-block;
            animation: shinePulse 2s ease-in-out infinite;
            box-shadow: 0 0 8px #4a7cf7;
        }

        @keyframes shinePulse {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        /* ── адаптив ── */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 40px 20px 30px;
                border-radius: 32px;
            }
            .maintenance-card h1 {
                font-size: 1.8rem;
            }
            .gear-icon {
                font-size: 52px;
            }
            .pulse-bar {
                width: 8px;
                height: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">

        <!-- анимированная шестерёнка -->
        <div class="gear-icon">⚙️</div>

        <!-- главный заголовок -->
        <h1>Технические работы</h1>
        <p class="sub">на сайте &nbsp;·&nbsp; скоро всё заработает</p>

        <!-- индикаторы-полоски -->
        <div class="loader-group">
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
            <span class="pulse-bar"></span>
        </div>

        <!-- статус с анимированными точками -->
        <div class="status-text">
            <span>Идёт обновление</span>
            <span class="dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </span>
        </div>

        <!-- нижняя строка с мини-анимациями -->
        <div class="footer-note">
            <span>приносим извинения</span>
            <span class="heart">♥</span>
            <span>команда разработчиков</span>
            <span class="shine"></span>
        </div>

    </div>

</body>
</html>
